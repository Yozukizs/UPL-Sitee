<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Players - UPL League</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="images/upl.png">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo" onclick="location.href='index.html'">
    <img src="images/upl.png">
    <b>UPL League</b>
  </div>

  <div class="nav">
    <a href="index.html">Dashboard</a>
    <a href="teams.html">Teams</a>
    <a class="active" href="players.html">Players</a>
    <a href="matches.html">Matches</a>
    <a href="news.html">News</a>
  </div>
</div>

<div class="container">

  <h1>Players</h1>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" id="search" placeholder="Search players...">
  </div>

  <!-- TABLE -->
  <table id="playersTable">
    <thead>
      <tr>
        <th>PLAYER</th>
        <th>TEAM</th>
        <th>CLASS</th>
        <th>GOALS</th>
        <th>ASSISTS</th>
        <th>GAMES</th>
        <th>ROLE</th>
        <th>POSITION</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

// TEAM LOGOS
const teamLogos = {
  "Shakhtar": "images/shakhtar.png",
  "Bukovyna": "images/bukovyna.png",
  "Polissya": "images/polissya.png",
  "Chornomorets": "images/chornomorets.png"
};

// LOAD PLAYERS
fetch("data/players.json")
.then(res => res.json())
.then(players => {

  const tbody = document.querySelector("#playersTable tbody");

  function render(data){
    tbody.innerHTML = "";

    data.forEach(p => {

      let row = document.createElement("tr");

      row.innerHTML = `
        <td class="${p.class || ''}">${p.name || "Unknown"}</td>

        <td>
          <img src="${teamLogos[p.team] || 'images/upl.png'}"
               style="width:20px;vertical-align:middle;margin-right:6px;">
          ${p.team || "Free Agent"}
        </td>

        <td class="${p.class || ''}">${p.class || "-"}</td>
        <td>${p.goals ?? 0}</td>
        <td>${p.assists ?? 0}</td>
        <td>${p.games ?? 0}</td>
        <td>${p.role || "Player"}</td>
        <td>${p.position || "-"}</td>
      `;

      tbody.appendChild(row);
    });
  }

  render(players);

  // SEARCH FUNCTION
  document.getElementById("search").addEventListener("input", e=>{
    const value = e.target.value.toLowerCase();

    const filtered = players.filter(p =>
      (p.name || "").toLowerCase().includes(value)
    );

    render(filtered);
  });

})
.catch(err => console.error("Error loading players:", err));

</script>

</body>
</html>
