<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="images/upl.png">
</head>

<body>

<div class="topbar">
  <div class="logo" onclick="location.href='index.html'">
    <img src="images/upl.png">
    <b>UPL League</b>
  </div>

  <div class="nav">
    <a href="index.html">Dashboard</a>
    <a href="teams.html" class="active">Teams</a>
    <a href="players.html">Players</a>
    <a href="matches.html">Matches</a>
    <a href="news.html">News</a>
  </div>
</div>

<div class="container">

  <h1 id="teamName"></h1>

  <table>
    <thead>
      <tr>
        <th>PLAYER</th>
        <th>CLASS</th>
        <th>GOALS</th>
        <th>ASSISTS</th>
        <th>GAMES</th>
        <th>ROLE</th>
        <th>POSITION</th>
      </tr>
    </thead>
    <tbody id="players"></tbody>
  </table>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const team = params.get("team");

document.getElementById("teamName").innerText = team;

// LOAD PLAYERS
fetch("data/players.json")
.then(res => res.json())
.then(players => {

  const teamPlayers = players.filter(p => p.team === team);

  const tbody = document.getElementById("players");

  if(teamPlayers.length === 0){
    tbody.innerHTML = `<tr><td colspan="7">No players found</td></tr>`;
    return;
  }

  tbody.innerHTML = teamPlayers.map(p => `
    <tr>
      <td class="${p.class}">${p.name}</td>
      <td>${p.class}</td>
      <td>${p.goals}</td>
      <td>${p.assists}</td>
      <td>${p.games}</td>
      <td>${p.role}</td>
      <td>${p.position}</td>
    </tr>
  `).join("");

});

</script>

</body>
</html>
