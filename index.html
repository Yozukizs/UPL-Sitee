<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UPL League</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="images/upl.png">

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo" onclick="location.href='index.html'">
    <img src="images/upl.png">
    <b>UPL League</b>
  </div>

  <div class="nav">
    <a class="active" href="index.html">Dashboard</a>
    <a href="teams.html">Teams</a>
    <a href="players.html">Players</a>
    <a href="matches.html">Matches</a>
    <a href="news.html">News</a>
  </div>
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>UPL League</h1>
      <p>Official Competitive Football Platform</p>

      <div class="hero-stats">
        <div class="hero-card">
          <span id="totalPlayers">0</span>
          <small>Players</small>
        </div>

        <div class="hero-card">
          <span id="totalTeams">0</span>
          <small>Teams</small>
        </div>

        <div class="hero-card">
          <span id="totalMatches">0</span>
          <small>Matches</small>
        </div>
      </div>
    </div>

    <div class="hero-glow"></div>
  </div>

  <!-- TOP SCORERS -->
  <div class="card">
    <h2>Top Scorers</h2>
    <div id="topScorers"></div>
  </div>

  <!-- UPCOMING -->
  <div class="card">
    <h2>Upcoming Matches</h2>
    <div id="upcomingMatches"></div>
  </div>

  <!-- NEWS -->
  <div class="card">
    <h2>Latest News</h2>
    <div id="latestNews"></div>
  </div>

</div>

<script>

// PLAYERS
fetch("data/players.json")
.then(res => res.json())
.then(players => {

  document.getElementById("totalPlayers").innerText = players.length;

  const teams = [...new Set(players.map(p => p.team))];
  document.getElementById("totalTeams").innerText = teams.length;

  // TOP SCORERS
  const sorted = [...players].sort((a,b) => (b.goals||0) - (a.goals||0)).slice(0,5);

  document.getElementById("topScorers").innerHTML =
    sorted.map(p => `
      <div class="list-item">
        ${p.name} — ${p.goals || 0} goals
      </div>
    `).join("");

});

// MATCHES
fetch("data/matches.json")
.then(res => res.json())
.then(matches => {

  document.getElementById("totalMatches").innerText = matches.length;

  const upcoming = matches.filter(m => !m.played).slice(0,3);

  document.getElementById("upcomingMatches").innerHTML =
    upcoming.map(m => `
      <div class="list-item">
        ${m.home} vs ${m.away}
      </div>
    `).join("");

});

// NEWS
fetch("data/news.json")
.then(res => res.json())
.then(news => {

  document.getElementById("latestNews").innerHTML =
    news.slice(0,3).map(n => `
      <div class="list-item">
        ${n.title}
      </div>
    `).join("");

});

</script>

</body>
</html>
