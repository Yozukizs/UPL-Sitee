<!DOCTYPE html>
<html>
<head>
<title>Matches</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="images/upl.png">

<style>

/* GRID */
.matches{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

/* CARD */
.match-card{
background:rgba(20,30,60,0.9);
border-radius:18px;
padding:25px;
cursor:pointer;
transition:0.3s;
display:flex;
flex-direction:column;
align-items:center;
}

.match-card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 25px rgba(37,99,235,0.5);
}

/* TEAMS ROW */
.row{
display:flex;
align-items:center;
justify-content:space-between;
width:100%;
}

/* TEAM */
.team{
display:flex;
flex-direction:column;
align-items:center;
width:120px;
}

.team img{
width:60px;
height:60px;
object-fit:contain;
margin-bottom:8px;
}

/* VS */
.vs{
font-size:22px;
font-weight:bold;
}

/* STATUS */
.status{
margin-top:10px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo" onclick="window.location='index.html'">
<img src="images/upl.png">
<b>UPL League</b>
</div>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="teams.html">Teams</a>
<a href="players.html">Players</a>
<a href="matches.html" class="active">Matches</a>
<a href="news.html">News</a>
</div>
</div>

<div style="padding:40px">

<h1>Matches</h1>

<div id="matches" class="matches"></div>

</div>

<script>

/* TEAM LOGO MAP */
const logos = {
"Shakhtar":"images/shakhtar.png",
"Bukovyna":"images/bukovyna.png",
"Polissya":"images/polissya.png",
"Chornomorets":"images/chornomorets.png"
};

fetch("data/matches.json")
.then(r=>r.json())
.then(data=>{

document.getElementById("matches").innerHTML =
data.map(m=>`

<div class="match-card" onclick="goMatch(${m.id})">

<div class="row">

<div class="team">
<img src="${logos[m.home]}">
<span>${m.home}</span>
</div>

<div class="vs">
${m.played ? m.homeScore + " - " + m.awayScore : "VS"}
</div>

<div class="team">
<img src="${logos[m.away]}">
<span>${m.away}</span>
</div>

</div>

<div class="status">
${m.played ? "Finished" : "Upcoming"}
</div>

</div>

`).join("");

});

/* 🔥 FIXED REDIRECT */
function goMatch(id){
window.location.href = "match.html?id=" + id;
}

</script>

</body>
</html>
